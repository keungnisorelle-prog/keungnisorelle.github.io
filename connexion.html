<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - Hôtel</title>
  
  <!-- Bootstrap 5 CSS (local) -->
  <link href="vendor/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Fontawesome (local) -->
  <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
  
  <!-- CSS personnalisé -->
  <style>
    /* Dégradé personnalisé */
    .bg-degrade {
      background: linear-gradient(60deg, #1E0569, #5b0cdc);
    }
    
    /* Bouton avec dégradé et animation */
    .btn-degrade {
      background: linear-gradient(60deg, #1E0569, #5b0cdc);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .btn-degrade:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91, 12, 220, 0.3);
      background: linear-gradient(60deg, #2a0a7a, #6b1be8);
    }
    
    .btn-degrade:active {
      transform: translateY(0);
    }
    
    /* Ombre personnalisée */
    .shadow-custom {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }
    
    /* Coins arrondis personnalisés */
    .rounded-4 {
      border-radius: 1.25rem !important;
    }
    
    /* Focus personnalisé pour les inputs */
    .form-control:focus {
      border-color: #5b0cdc;
      box-shadow: 0 0 0 0.2rem rgba(91, 12, 220, 0.25);
    }
    
    /* Animation d'apparition */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-fade-in {
      animation: fadeInUp 0.6s ease-out;
    }
    
    /* Fond d'arrière-plan */
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      height: 100vh;
      overflow: hidden;
    }
    
    /* Effet hover sur le lien */
    .hover-purple:hover {
      color: #5b0cdc !important;
      transition: color 0.2s ease;
    }
    
    /* Ajustement de la carte pour qu'elle tienne dans l'écran */
    .card {
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    
    /* Masquer la scrollbar sur la carte tout en gardant la fonctionnalité */
    .card::-webkit-scrollbar {
      width: 6px;
    }
    
    .card::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    
    .card::-webkit-scrollbar-thumb {
      background: #5b0cdc;
      border-radius: 10px;
    }
  </style>
</head>
<body class="d-flex flex-column" style="height: 100vh; overflow: hidden;">

<!-- Header compact -->
<header class="bg-degrade text-white shadow-sm flex-shrink-0">
  <nav class="navbar navbar-expand-lg navbar-dark container py-2">
    <div class="container-fluid px-0">
      <a class="navbar-brand fw-bold fs-3" href="accueil.html">
        <i class="fas fa-building me-2"></i>Hôtel
      </a>
      
      <div class="ms-auto">
        <a class="nav-link text-white-50 hover-purple" href="accueil.html">
          <i class="fas fa-home me-1"></i>Accueil
        </a>
      </div>
    </div>
  </nav>
</header>

<!-- Contenu principal - prend tout l'espace restant -->
<main class="flex-grow-1 d-flex align-items-center justify-content-center py-3">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        
        <!-- Carte de connexion -->
        <div class="card border-0 shadow-custom rounded-4 animate-fade-in">
          <div class="card-body p-4">
            
            <!-- En-tête compact -->
            <div class="text-center mb-3">
              <div class="bg-degrade rounded-circle d-inline-flex p-2 mb-2 shadow-sm">
                <i class="fas fa-sign-in-alt text-white fs-3"></i>
              </div>
              <h1 class="h3 fw-bold" style="color: #1E0569;">Connexion</h1>
              <p class="text-secondary small">Bienvenue, connectez-vous à votre compte</p>
            </div>
            
            <!-- Message d'erreur -->
            <div id="erreurConnexion" class="alert alert-danger d-none small py-2" role="alert">
              <i class="fas fa-exclamation-triangle me-2"></i>
              Email ou mot de passe incorrect.
            </div>
            
            <!-- Formulaire compact -->
            <form action="traitement_connexion.php" method="POST" id="formConnexion">
              
              <!-- Champ Email -->
              <div class="mb-2">
                <label for="email" class="form-label fw-semibold small">
                  <i class="fas fa-envelope me-1" style="color: #5b0cdc;"></i>Email
                </label>
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="votreemail@mail.com" required>
              </div>
              
              <!-- Champ Mot de passe -->
              <div class="mb-2">
                <label for="mot_de_passe" class="form-label fw-semibold small">
                  <i class="fas fa-lock me-1" style="color: #5b0cdc;"></i>Mot de passe
                </label>
                <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe" 
                       placeholder="•••••" required>
              </div>
              
              <!-- Options supplémentaires compactes -->
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe" style="border-color: #5b0cdc;">
                  <label class="form-check-label small" for="rememberMe">
                    <i class="fas fa-check-circle me-1 small"></i>Se souvenir
                  </label>
                </div>
                <a href="mot_de_passe_oublie.html" class="text-decoration-none small" style="color: #5b0cdc;">
                  <i class="fas fa-question-circle me-1"></i>Mot de passe oublié ?
                </a>
              </div>
              
              <!-- Bouton de connexion -->
              <button type="submit" class="btn btn-degrade text-white w-100 py-1 fw-semibold border-0">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
              </button>
              
              <!-- Séparateur compact -->
              <div class="position-relative my-3">
                <hr>
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">
                  ou
                </span>
              </div>
              
              <!-- Lien vers inscription compact -->
              <div class="text-center">
                <p class="mb-0 small">
                  Vous n'avez pas de compte ?
                  <a href="inscription.html" class="text-decoration-none fw-semibold" style="color: #5b0cdc;">
                    <i class="fas fa-user-plus me-1"></i>Créer un compte
                  </a>
                </p>
              </div>
              
            </form>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</main>

<!-- Footer compact -->
<footer class="bg-white border-top py-2 flex-shrink-0">
  <div class="container">
    <div class="row justify-content-between align-items-center">
      <div class="col-12 col-md-auto text-center text-md-start">
        <i class="fas fa-phone-alt me-2" style="color: #5b0cdc;"></i>
        <span class="small">+237 6 81 72 33 45 / 6 99 50 78 34</span>
      </div>
      <div class="col-12 col-md-auto text-center text-md-end">
        <span class="small text-muted">
          <i class="far fa-copyright me-1"></i>2026 Hôtel
        </span>
      </div>
    </div>
  </div>
</footer>

<!-- Scripts locaux -->
<script src="vendor/js/bootstrap.bundle.min.js"></script>

<script>
  document.getElementById('formConnexion').addEventListener('submit', function(event) {
    var email = document.getElementById('email').value.trim();
    var motDePasse = document.getElementById('mot_de_passe').value;
    var erreurDiv = document.getElementById('erreurConnexion');
    
    if (email === '' || motDePasse === '') {
      event.preventDefault();
      erreurDiv.classList.remove('d-none');
      erreurDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Veuillez remplir tous les champs.';
      erreurDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      erreurDiv.classList.add('d-none');
    }
  });
  
  var emailInput = document.getElementById('email');
  var mdpInput = document.getElementById('mot_de_passe');
  
  function masquerErreur() {
    var erreurDiv = document.getElementById('erreurConnexion');
    if (!erreurDiv.classList.contains('d-none')) {
      erreurDiv.classList.add('d-none');
    }
  }
  
  emailInput.addEventListener('input', masquerErreur);
  mdpInput.addEventListener('input', masquerErreur);
</script>

</body>
</html>
